name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  Netz:
    attributes:
      datumLetzteAktualisierung:
        instantiates:
        - xsd:element
        range: DateTime
      mastrNummer:
        instantiates:
        - xsd:element
        range: String
      sparte:
        instantiates:
        - xsd:element
        range: Integer
      kundenAngeschlossen:
        instantiates:
        - xsd:element
        range: Integer
      geschlossenesVerteilnetz:
        instantiates:
        - xsd:element
        range: Integer
      bezeichnung:
        instantiates:
        - xsd:element
        range: String
      marktgebiet:
        instantiates:
        - xsd:element
        range: Integer
      bundesland:
        instantiates:
        - xsd:element
        range: String
      bilanzierungsgebiete:
        instantiates:
        - xsd:element
        range: String
  Netze:
    attributes:
      netz:
        instantiates:
        - xsd:element
        range: Netz
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      netze:
        instantiates:
        - xsd:element
        range: Netze

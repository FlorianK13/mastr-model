name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  Ertuechtigung:
    attributes:
      id:
        instantiates:
        - xsd:element
        range: Integer
      datumLetzteAktualisierung:
        instantiates:
        - xsd:element
        range: DateTime
      eegMastrNummer:
        instantiates:
        - xsd:element
        range: String
      ertuechtigungsart:
        instantiates:
        - xsd:element
        range: Integer
      ertuechtigungIstZulassungspflichtig:
        instantiates:
        - xsd:element
        range: Integer
      leistungserhoehung:
        instantiates:
        - xsd:element
        range: Float
      wiederinbetriebnahmeDatum:
        instantiates:
        - xsd:element
        range: DateTime
  Ertuechtigungen:
    attributes:
      ertuechtigung:
        instantiates:
        - xsd:element
        range: Ertuechtigung
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      ertuechtigungen:
        instantiates:
        - xsd:element
        range: Ertuechtigungen

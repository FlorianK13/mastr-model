name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  MarktakteurUndRolle:
    attributes:
      marktakteurMastrNummer:
        instantiates:
        - xsd:element
        range: String
      datumLetzteAktualisierung:
        instantiates:
        - xsd:element
        range: DateTime
      mastrNummer:
        instantiates:
        - xsd:element
        range: String
      marktrolle:
        instantiates:
        - xsd:element
        range: String
      bundesnetzagenturBetriebsnummer:
        instantiates:
        - xsd:element
        range: String
      bundesnetzagenturBetriebsnummerNv:
        instantiates:
        - xsd:element
        range: Integer
      marktpartneridentifikationsnummer:
        instantiates:
        - xsd:element
        range: String
      marktpartneridentifikationsnummerNv:
        instantiates:
        - xsd:element
        range: Integer
      kontaktdatenMarktrolle:
        instantiates:
        - xsd:element
        range: String
  MarktakteureUndRollen:
    attributes:
      marktakteurUndRolle:
        instantiates:
        - xsd:element
        range: MarktakteurUndRolle
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      marktakteureUndRollen:
        instantiates:
        - xsd:element
        range: MarktakteureUndRollen

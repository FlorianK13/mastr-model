name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  Katalogkategorie:
    attributes:
      id:
        instantiates:
        - xsd:element
        range: Integer
      name:
        instantiates:
        - xsd:element
        range: String
  Katalogkategorien:
    attributes:
      katalogkategorie:
        instantiates:
        - xsd:element
        range: Katalogkategorie
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      katalogkategorien:
        instantiates:
        - xsd:element
        range: Katalogkategorien

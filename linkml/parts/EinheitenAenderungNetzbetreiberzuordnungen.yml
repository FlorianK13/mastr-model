name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  EinheitenAenderungNetzbetreiberzuordnung:
    attributes:
      einheitMastrNummer:
        instantiates:
        - xsd:element
        range: String
      lokationMastrNummer:
        instantiates:
        - xsd:element
        range: String
      netzanschlusspunktMastrNummer:
        instantiates:
        - xsd:element
        range: String
      netzbetreiberMastrNummerAlt:
        instantiates:
        - xsd:element
        range: String
      netzbetreiberMastrNummerNeu:
        instantiates:
        - xsd:element
        range: String
      artDerAenderung:
        instantiates:
        - xsd:element
        range: Integer
      registrierungsdatumNetzbetreiberzuordnungsaenderung:
        instantiates:
        - xsd:element
        range: DateTime
      netzbetreiberzuordnungsaenderungsdatum:
        instantiates:
        - xsd:element
        range: DateTime
  EinheitenAenderungNetzbetreiberzuordnungen:
    attributes:
      einheitenAenderungNetzbetreiberzuordnung:
        instantiates:
        - xsd:element
        range: EinheitenAenderungNetzbetreiberzuordnung
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      einheitenAenderungNetzbetreiberzuordnungen:
        instantiates:
        - xsd:element
        range: EinheitenAenderungNetzbetreiberzuordnungen

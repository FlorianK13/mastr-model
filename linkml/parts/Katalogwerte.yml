name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  Katalogwert:
    attributes:
      id:
        instantiates:
        - xsd:element
        range: Integer
      wert:
        instantiates:
        - xsd:element
        range: String
      katalogKategorieId:
        instantiates:
        - xsd:element
        range: Integer
  Katalogwerte:
    attributes:
      katalogwert:
        instantiates:
        - xsd:element
        range: Katalogwert
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      katalogwerte:
        instantiates:
        - xsd:element
        range: Katalogwerte

name: test-schema
id: http://example.org/test-schema
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  test_schema: http://example.org/test-schema/
  xsd: http://www.w3.org/2001/XMLSchema
default_prefix: test_schema
default_range: string
classes:
  Lokation:
    attributes:
      datumLetzteAktualisierung:
        instantiates:
        - xsd:element
        range: DateTime
      mastrNummer:
        instantiates:
        - xsd:element
        range: String
      nameDerTechnischenLokation:
        instantiates:
        - xsd:element
        range: String
      lokationtyp:
        instantiates:
        - xsd:element
        range: Integer
      verknuepfteEinheitenMaStRNummern:
        instantiates:
        - xsd:element
        range: String
      netzanschlusspunkteMaStRNummern:
        instantiates:
        - xsd:element
        range: String
  Lokationen:
    attributes:
      lokation:
        instantiates:
        - xsd:element
        range: Lokation
  SchemaRoot:
    description: Entry point of the schema, treated as a class
    attributes:
      lokationen:
        instantiates:
        - xsd:element
        range: Lokationen
